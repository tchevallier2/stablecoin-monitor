name: Solana ETF Data Ingestion

on:
  schedule:
    # 12:00 UTC = 8:00 AM ET (before market open)
    - cron: "0 12 * * 1-5"
    # 21:00 UTC = 5:00 PM ET (after market close at 4 PM)
    - cron: "0 21 * * 1-5"
  workflow_dispatch: # Allow manual trigger

jobs:
  ingest-etfs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Ingest Solana ETF data (Yahoo Finance)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python ingestion/ingest_etf_data.py
